model:
  stage2_path: runs/stage2_cls/yolov8s_stage2/weights/best.pt
  device: mps

stage1:
  # Full-frame parking-space detector checkpoint.
  detector_path: runs/stage1_det/yolov8s_stage1/weights/best.pt
  min_box_area: 1500
  filter_mode: bounds

input:
  frame_interval_ms: 500
  post_interval_s: 2.0

backend:
  timeout_s: 0.75
  retry_delay_s: 10.0

stream:
  max_width: 640
  jpeg_quality: 55

postprocess:
  smoothing_window: 5
  classifier_threshold: 0.5

logging:
  output_dir: logs
  format: json

# Optional: rectify an oblique camera view before ROIs and classification.
# source_points must be ordered consistently (for example: top-left, top-right,
# bottom-right, bottom-left). If destination_points is omitted, output_size
# produces a rectangular bird's-eye target.
preprocess:
  perspective:
    source_points:
      - [0, 0]
      - [1279, 0]
      - [1279, 719]
      - [0, 719]
    output_size: [1280, 720]

rois:
  spot_1: [50, 100, 200, 250]
  spot_2: [210, 100, 360, 250]
  spot_3: [370, 100, 520, 250]
  spot_4: [530, 100, 680, 250]
